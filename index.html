<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>苹果软件合集安装</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            margin-top: 80px;
            background: #f5f5f7;
        }
        .container {
            max-width: 320px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            font-size: 24px;
            color: #1d1d1f;
            margin-bottom: 30px;
        }
        .install-btn {
            display: block;
            padding: 16px;
            margin: 15px 0;
            background: #007aff;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .install-btn:hover {
            background: #0066cc;
        }
        .note {
            margin-top: 40px;
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>苹果APP在线安装</h1>
        
        <!-- 第一个轩辕 -->
        <a class="install-btn" href="itms-services://?action=download-manifest&url=app1/manifest.plist">
            安装 轩辕（版本1）
        </a>

        <!-- 第二个轩辕 -->
        <a class="install-btn" href="itms-services://?action=download-manifest&url=app2/manifest.plist">
            安装 轩辕（版本2）
        </a>

        <div class="note">
            请使用 Safari 浏览器打开<br>
            安装后请前往「设置 → 通用 → VPN与设备管理」信任证书
        </div>
    </div>
</body>
</html>
